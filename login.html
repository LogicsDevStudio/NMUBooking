<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Login - Activity Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow">
            <h3 class="text-center">Staff Login</h3>
            <div class="mb-3"><label>Email</label><input type="email" id="email" class="form-control"></div>
            <div class="mb-3"><label>Password</label><input type="password" id="pass" class="form-control"></div>
            <button class="btn btn-primary w-100" id="btnLogin">เข้าสู่ระบบ</button>
        </div>
    </div>
</div>
<script type="module">
    import { auth, signInWithEmailAndPassword } from './js/firebase-config.js';
    document.getElementById('btnLogin').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p)
            .then(() => location.href = 'booking.html')
            .catch(err => alert("Login Failed: " + err.message));
    };
</script>
</body>
</html>
