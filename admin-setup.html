<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Admin Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h3>⚙️ ตั้งค่าฐานกิจกรรม</h3>
    <div class="card p-3 mb-4">
        <h5>1. เพิ่มฐานกิจกรรม</h5>
        <input type="text" id="stName" class="form-control mb-2" placeholder="ชื่อฐาน">
        <button id="btnAddStation" class="btn btn-primary">บันทึกฐาน</button>
    </div>
    
    <div class="card p-3 mb-4">
        <h5>2. เพิ่มรอบและที่นั่ง</h5>
        <select id="selSt" class="form-select mb-2"></select>
        <input type="time" id="startTime" class="form-control mb-2">
        <input type="number" id="totalSeats" class="form-control mb-2" placeholder="จำนวนที่นั่ง">
        <button id="btnAddRound" class="btn btn-success">สร้างรอบและที่นั่ง</button>
    </div>
</div>

<script type="module">
    import { db, ref, push, set, onValue } from './js/firebase-config.js';

    // เพิ่มฐาน
    document.getElementById('btnAddStation').onclick = () => {
        const name = document.getElementById('stName').value;
        push(ref(db, 'stations'), { name: name });
        alert("เพิ่มฐานสำเร็จ");
    };

    // โหลดฐานใส่ Select
    onValue(ref(db, 'stations'), (snap) => {
        const sel = document.getElementById('selSt');
        sel.innerHTML = '';
        snap.forEach(child => { sel.innerHTML += `<option value="${child.key}">${child.val().name}</option>`; });
    });

    // สร้างรอบและที่นั่งอัตโนมัติ
    document.getElementById('btnAddRound').onclick = () => {
        const sid = document.getElementById('selSt').value;
        const time = document.getElementById('startTime').value;
        const total = parseInt(document.getElementById('totalSeats').value);

        const roundRef = push(ref(db, 'rounds'));
        set(roundRef, { stationId: sid, startTime: time, totalSeats: total });

        // สร้างที่นั่งเริ่มต้น (available)
        const seats = {};
        for(let i=1; i<=total; i++) {
            seats[`seat_${i}`] = { status: 'available' };
        }
        set(ref(db, `seats/${roundRef.key}`), seats);
        alert("สร้างรอบและผังที่นั่งสำเร็จ!");
    };
</script>
</body>
</html>
