<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Booking - ระบบจองที่นั่ง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .seat { width: 40px; height: 40px; margin: 5px; cursor: pointer; border: 1px solid #ccc; text-align: center; line-height: 40px; border-radius: 5px; display: inline-block; }
        .available { background-color: #2ecc71; color: white; }
        .booked { background-color: #e74c3c; color: white; cursor: not-allowed; }
        .selected { background-color: #3498db; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4"><div class="container"><span class="navbar-brand">Booking System</span></div></nav>
<div class="container">
    <div class="row">
        <div class="col-md-4">
            <h5>1. ข้อมูลผู้เข้าร่วม</h5>
            <div class="input-group mb-3">
                <input type="text" id="idCard" class="form-control" placeholder="เลขบัตร ปชช.">
                <button class="btn btn-outline-secondary" id="btnSearch">ค้นหา</button>
            </div>
            <div id="userInfo" class="p-3 border rounded bg-light mb-3 d-none">
                <p id="uName"></p><p id="uPhone"></p>
            </div>
            <h5>2. เลือกฐานและรอบ</h5>
            <select id="selStation" class="form-select mb-2"><option value="">-- เลือกฐาน --</option></select>
            <select id="selRound" class="form-select mb-3"><option value="">-- เลือกรอบ --</option></select>
        </div>
        <div class="col-md-8 text-center">
            <h5>3. ผังที่นั่ง</h5>
            <div id="seatMap" class="border p-4 bg-white shadow-sm mb-3"></div>
            <button id="btnConfirm" class="btn btn-success btn-lg d-none">ยืนยันการจอง</button>
            <div id="qrcode" class="mt-3 d-flex justify-content-center"></div>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth, ref, get, onValue, runTransaction, GOOGLE_SCRIPT_URL } from './js/firebase-config.js';

    let selectedSeat = null;
    let currentUserData = null;

    // ค้นหาข้อมูลจาก Google Sheet
    document.getElementById('btnSearch').onclick = async () => {
        const id = document.getElementById('idCard').value;
        const res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ nationalId: id }) });
        const data = await res.json();
        if(data.status === "success") {
            currentUserData = data;
            document.getElementById('uName').innerText = "ชื่อ: " + data.name;
            document.getElementById('userInfo').classList.remove('d-none');
        } else {
            alert("ไม่พบข้อมูลสมาชิก");
        }
    };

    // โหลดฐานข้อมูลฐานกิจกรรม (อ้างอิงตามสิทธิ์ Staff)
    onValue(ref(db, 'stations'), (snap) => {
        const stations = snap.val();
        const sel = document.getElementById('selStation');
        for(let id in stations) sel.innerHTML += `<option value="${id}">${stations[id].name}</option>`;
    });

    // เมื่อเลือกฐาน -> โหลดรอบ
    document.getElementById('selStation').onchange = (e) => {
        const sid = e.target.value;
        onValue(ref(db, 'rounds'), (snap) => {
            const rounds = snap.val();
            const sel = document.getElementById('selRound');
            sel.innerHTML = '<option value="">-- เลือกรอบ --</option>';
            for(let rid in rounds) {
                if(rounds[rid].stationId === sid) sel.innerHTML += `<option value="${rid}">${rounds[rid].startTime}</option>`;
            }
        });
    };

    // เมื่อเลือกรอบ -> แสดงผังที่นั่ง Real-time
    document.getElementById('selRound').onchange = (e) => {
        const rid = e.target.value;
        onValue(ref(db, `seats/${rid}`), (snap) => {
            const seats = snap.val();
            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            for(let sid in seats) {
                const div = document.createElement('div');
                div.className = `seat ${seats[sid].status}`;
                div.innerText = sid.replace('seat_', '');
                if(seats[sid].status === 'available') {
                    div.onclick = () => {
                        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        selectedSeat = sid;
                        document.getElementById('btnConfirm').classList.remove('d-none');
                    };
                }
                map.appendChild(div);
            }
        });
    };

    // ยืนยันการจอง
    document.getElementById('btnConfirm').onclick = async () => {
        const rid = document.getElementById('selRound').value;
        const sid = selectedSeat;
        const idCard = document.getElementById('idCard').value;

        // ใช้ Transaction ป้องกันการจองซ้ำ
        const seatRef = ref(db, `seats/${rid}/${sid}`);
        runTransaction(seatRef, (seat) => {
            if (seat && seat.status === 'available') {
                seat.status = 'booked';
                return seat;
            }
            return; // ยกเลิกถ้าที่นั่งไม่ว่างแล้ว
        }).then((result) => {
            if (result.committed) {
                const bookingId = "BK" + Date.now();
                // บันทึกข้อมูลการจอง
                const bookingRef = ref(db, `bookings/${bookingId}`);
                const data = { ...currentUserData, nationalId: idCard, roundId: rid, seatId: sid, status: 'booked' };
                update(bookingRef, data);
                
                // สร้าง QR Code
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), bookingId);
                alert("จองสำเร็จ!");
            } else {
                alert("ที่นั่งนี้ถูกจองไปแล้ว");
            }
        });
    };
</script>
</body>
</html>
