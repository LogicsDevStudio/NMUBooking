<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการกิจกรรม - Booking Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .seat { width: 45px; height: 45px; margin: 5px; cursor: pointer; border: 1px solid #ddd; text-align: center; line-height: 45px; border-radius: 8px; display: inline-block; font-weight: bold; transition: 0.3s; }
        .available { background-color: #d1e7dd; color: #0f5132; }
        .booked { background-color: #f8d7da; color: #842029; cursor: not-allowed; }
        .selected { background-color: #0d6efd; color: white; border-color: #0d6efd; }
        #adminMenu { display: none; } /* ซ่อนไว้ก่อนจนกว่าจะตรวจสอบสิทธิ์ */
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Activity Booking System</a>
        <div class="d-flex align-items-center">
            <span id="userDisplay" class="text-light me-3 small"></span>
            <button id="btnLogout" class="btn btn-outline-danger btn-sm">ออกจากระบบ</button>
        </div>
    </div>
</nav>

<div id="adminMenu" class="bg-white border-bottom shadow-sm mb-4">
    <div class="container py-2">
        <div class="d-flex overflow-auto">
            <span class="navbar-text text-dark me-3 fw-bold">Admin Tools:</span>
            <a href="admin-users.html" class="btn btn-sm btn-outline-primary me-2">👥 จัดการเจ้าหน้าที่</a>
            <a href="admin-setup.html" class="btn btn-sm btn-outline-primary me-2">⚙️ ตั้งค่าฐาน/รอบ</a>
            <a href="admin-bookings.html" class="btn btn-sm btn-outline-primary me-2">📋 รายการจองทั้งหมด</a>
            <a href="checkin.html" class="btn btn-sm btn-outline-success me-2">✅ หน้า Check-in</a>
        </div>
    </div>
</div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">1. ข้อมูลผู้เข้าร่วม</h5>
                    <div class="input-group mb-3">
                        <input type="text" id="idCard" class="form-control" placeholder="เลขบัตร ปชช. 13 หลัก">
                        <button class="btn btn-primary" id="btnSearch">ค้นหา</button>
                    </div>
                    <div id="userInfo" class="p-3 border rounded bg-light d-none">
                        <p class="mb-1"><b>ชื่อ:</b> <span id="uName"></span></p>
                        <p class="mb-1"><b>โทร:</b> <span id="uPhone"></span></p>
                        <p class="mb-0 text-muted small"><span id="uEmail"></span></p>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">2. เลือกกิจกรรม</h5>
                    <label class="small">ฐานกิจกรรม</label>
                    <select id="selStation" class="form-select mb-2"><option value="">-- เลือกฐาน --</option></select>
                    <label class="small">รอบกิจกรรม</label>
                    <select id="selRound" class="form-select mb-3"><option value="">-- เลือกรอบ --</option></select>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center">
                    <h5 class="card-title mb-4">3. เลือกที่นั่ง</h5>
                    <div id="seatMap" class="mb-4 p-3 border rounded bg-white min-vh-25">
                        <p class="text-muted">กรุณาเลือกรอบกิจกรรมเพื่อดูที่นั่ง</p>
                    </div>
                    
                    <div id="bookingAction" class="d-none">
                        <button id="btnConfirm" class="btn btn-success btn-lg px-5">ยืนยันการจองที่นั่ง</button>
                        <div id="qrcode" class="mt-4 d-flex flex-column align-items-center">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db, auth, ref, get, onValue, runTransaction, update, onAuthStateChanged, signOut, GOOGLE_SCRIPT_URL } from './js/firebase-config.js';

    let selectedSeat = null;
    let currentUserData = null;
    let userRole = 'staff';
    let allowedStations = [];

    // --- ตรวจสอบสิทธิ์การเข้าใช้งาน ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            get(ref(db, `users/${user.uid}`)).then((snapshot) => {
                const userData = snapshot.val();
                if (userData) {
                    userRole = userData.role;
                    allowedStations = userData.allowedStations || [];
                    document.getElementById('userDisplay').innerText = `เข้าสู่ระบบโดย: ${userData.email} (${userRole})`;
                    
                    // ถ้าเป็น Admin ให้แสดงเมนูตั้งค่า
                    if (userRole === 'admin') {
                        document.getElementById('adminMenu').style.display = 'block';
                    }
                    
                    loadStations(); // โหลดฐานกิจกรรมหลังจากทราบสิทธิ์
                }
            });
        } else {
            location.href = 'login.html'; // ถ้าไม่ได้ Login ให้เด้งไปหน้า Login
        }
    });

    // --- ปุ่ม Logout ---
    document.getElementById('btnLogout').onclick = () => {
        signOut(auth).then(() => location.href = 'login.html');
    };

    // --- ระบบค้นหาข้อมูล Google Sheets ---
    document.getElementById('btnSearch').onclick = async () => {
        const id = document.getElementById('idCard').value;
        if(id.length < 5) return alert("กรุณากรอกเลขบัตรให้ถูกต้อง");
        
        const btn = document.getElementById('btnSearch');
        btn.innerText = "กำลังค้นหา...";
        btn.disabled = true;

        try {
            const res = await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ nationalId: id }) 
            });
            const data = await res.json();
            if(data.status === "success") {
                currentUserData = data;
                document.getElementById('uName').innerText = data.name;
                document.getElementById('uPhone').innerText = data.phone;
                document.getElementById('uEmail').innerText = data.email;
                document.getElementById('userInfo').classList.remove('d-none');
            } else {
                alert("ไม่พบข้อมูลผู้เข้าร่วมในระบบฐานข้อมูลกลาง");
            }
        } catch (e) {
            alert("การเชื่อมต่อ Google Sheets ผิดพลาด");
        } finally {
            btn.innerText = "ค้นหา";
            btn.disabled = false;
        }
    };

    // --- โหลดฐานกิจกรรม (Filter ตามสิทธิ์) ---
    function loadStations() {
        onValue(ref(db, 'stations'), (snap) => {
            const stations = snap.val();
            const sel = document.getElementById('selStation');
            sel.innerHTML = '<option value="">-- เลือกฐาน --</option>';
            for(let id in stations) {
                // Admin เห็นทุกฐาน, Staff เห็นเฉพาะฐานที่ allowed
                if(userRole === 'admin' || allowedStations.includes(id)) {
                    sel.innerHTML += `<option value="${id}">${stations[id].name}</option>`;
                }
            }
        });
    }

    // --- โหลดรอบเมื่อเลือกฐาน ---
    document.getElementById('selStation').onchange = (e) => {
        const sid = e.target.value;
        onValue(ref(db, 'rounds'), (snap) => {
            const rounds = snap.val();
            const sel = document.getElementById('selRound');
            sel.innerHTML = '<option value="">-- เลือกรอบ --</option>';
            for(let rid in rounds) {
                if(rounds[rid].stationId === sid) {
                    sel.innerHTML += `<option value="${rid}">${rounds[rid].startTime} (ว่าง ${rounds[rid].totalSeats} ที่)</option>`;
                }
            }
        });
    };

    // --- แสดงที่นั่งเมื่อเลือกรอบ ---
    document.getElementById('selRound').onchange = (e) => {
        const rid = e.target.value;
        if(!rid) return;
        onValue(ref(db, `seats/${rid}`), (snap) => {
            const seats = snap.val();
            const map = document.getElementById('seatMap');
            map.innerHTML = '';
            for(let sid in seats) {
                const div = document.createElement('div');
                div.className = `seat ${seats[sid].status}`;
                div.innerText = sid.replace('seat_', '');
                if(seats[sid].status === 'available') {
                    div.onclick = () => {
                        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
                        div.classList.add('selected');
                        selectedSeat = sid;
                        document.getElementById('bookingAction').classList.remove('d-none');
                    };
                }
                map.appendChild(div);
            }
        });
    };

    // --- ยืนยันการจอง ---
    document.getElementById('btnConfirm').onclick = () => {
        if(!currentUserData || !selectedSeat) return alert("กรุณาเลือกที่นั่งและค้นหาข้อมูลผู้ใช้ก่อน");
        
        const rid = document.getElementById('selRound').value;
        const seatRef = ref(db, `seats/${rid}/${selectedSeat}`);

        runTransaction(seatRef, (seat) => {
            if (seat && seat.status === 'available') {
                seat.status = 'booked';
                return seat;
            }
            return; 
        }).then((result) => {
            if (result.committed) {
                const bookingId = "BK" + Date.now();
                const bookingRef = ref(db, `bookings/${bookingId}`);
                update(bookingRef, {
                    ...currentUserData,
                    nationalId: document.getElementById('idCard').value,
                    roundId: rid,
                    seatId: selectedSeat,
                    status: 'booked',
                    timestamp: Date.now()
                });
                
                document.getElementById('qrcode').innerHTML = '<p class="fw-bold text-success">การจองสำเร็จ! สแกน QR นี้เพื่อเช็คอิน</p>';
                new QRCode(document.getElementById("qrcode"), bookingId);
                alert("จองที่นั่งสำเร็จ!");
            } else {
                alert("ขออภัย ที่นั่งนี้เพิ่งถูกจองไป");
            }
        });
    };
</script>

</body>
</html>
