<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Check-in - Activity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
<div class="container mt-5 text-center">
    <h3>สแกน QR Code เพื่อเช็คอิน</h3>
    <div id="reader" style="width: 100%; max-width: 500px; margin: auto;"></div>
    <div id="result" class="mt-4 p-3 border rounded d-none bg-light">
        <h4 id="resName"></h4>
        <p id="resInfo"></p>
        <button id="btnConfirmCheckin" class="btn btn-primary btn-lg">ยืนยันเข้าฐาน</button>
    </div>
</div>

<script type="module">
    import { db, ref, get, update } from './js/firebase-config.js';

    let currentBookingId = null;
    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    
    scanner.render((decodedText) => {
        currentBookingId = decodedText;
        get(ref(db, `bookings/${currentBookingId}`)).then((snap) => {
            if(snap.exists()){
                const data = snap.val();
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resInfo').innerText = `ที่นั่ง: ${data.seatId} สถานะ: ${data.status}`;
                document.getElementById('result').classList.remove('d-none');
            }
        });
    });

    document.getElementById('btnConfirmCheckin').onclick = () => {
        update(ref(db, `bookings/${currentBookingId}`), { status: 'checked_in' })
            .then(() => {
                alert("เช็คอินเรียบร้อย!");
                location.reload();
            });
    };
</script>
</body>
</html>
