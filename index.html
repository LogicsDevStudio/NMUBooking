<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard แสดงที่นั่งว่าง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Activity Dashboard</a>
            <div class="d-flex">
                <a href="login.html" class="btn btn-outline-light">เข้าสู่ระบบเจ้าหน้าที่</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">📊 สถานะที่นั่งว่างกิจกรรม (Real-time)</h2>
        <div class="row" id="dashboard">
            </div>
    </div>

    <script type="module">
        import { db, ref, onValue } from './js/firebase-config.js';

        const dashboardElement = document.getElementById('dashboard');

        // ดึงข้อมูลรอบและที่นั่งแบบ Realtime
        const roundsRef = ref(db, 'rounds');
        
        onValue(roundsRef, (snapshot) => {
            dashboardElement.innerHTML = ''; // เคลียร์ของเก่าก่อน
            const data = snapshot.val();
            
            if (data) {
                for (const [roundId, roundData] of Object.entries(data)) {
                    // สร้าง Card แสดงผลโดยใช้ Bootstrap
                    const card = `
                        <div class="col-md-4 mb-3">
                            <div class="card shadow-sm h-100">
                                <div class="card-body">
                                    <h5 class="card-title text-primary fw-bold">ฐาน: ${roundData.stationId}</h5>
                                    <h6 class="card-subtitle mb-3 text-muted">เวลา: ${roundData.startTime}</h6>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="fs-5">ที่นั่งทั้งหมด:</span>
                                        <span class="fs-3 fw-bold text-success">${roundData.totalSeats}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    dashboardElement.innerHTML += card;
                }
            } else {
                dashboardElement.innerHTML = '<div class="col-12"><p class="text-muted">ยังไม่มีข้อมูลรอบกิจกรรม</p></div>';
            }
        });
    </script>
</body>
</html>
