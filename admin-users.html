<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>จัดการเจ้าหน้าที่ (Admin)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container"><span class="navbar-brand">⚙️ ระบบจัดการเจ้าหน้าที่</span></div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card p-4 shadow-sm">
                <h5>เพิ่ม/แก้ไข สิทธิ์เจ้าหน้าที่</h5>
                <div class="alert alert-info text-sm">
                    <b>วิธีใช้:</b> สร้างบัญชีใน Firebase Auth ก่อน จากนั้นนำ UID มากอกที่นี่เพื่อกำหนดสิทธิ์
                </div>
                <div class="mb-3">
                    <label>User UID (จาก Firebase Auth)</label>
                    <input type="text" id="uid" class="form-control" placeholder="เช่น a1B2c3D4e5...">
                </div>
                <div class="mb-3">
                    <label>อีเมล</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label>ระดับสิทธิ์ (Role)</label>
                    <select id="role" class="form-select">
                        <option value="staff">Staff (เจ้าหน้าที่ประจำฐาน)</option>
                        <option value="admin">Admin (ผู้ดูแลระบบ)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label><b>อนุญาตให้จัดการฐานใดบ้าง (เฉพาะ Staff)</b></label>
                    <div id="stationCheckboxes" class="border p-2 rounded bg-white mt-1">
                        </div>
                </div>

                <button id="btnSaveUser" class="btn btn-primary w-100">บันทึกข้อมูลสิทธิ์</button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4 shadow-sm">
                <h5>รายชื่อเจ้าหน้าที่ในระบบ</h5>
                <table class="table table-striped mt-3">
                    <thead>
                        <tr>
                            <th>อีเมล</th>
                            <th>ระดับสิทธิ์</th>
                            <th>ฐานที่ดูแล</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { db, ref, set, onValue } from './js/firebase-config.js';

    // 1. โหลดรายชื่อฐานกิจกรรมมาทำเป็น Checkbox
    const stationCheckboxes = document.getElementById('stationCheckboxes');
    onValue(ref(db, 'stations'), (snapshot) => {
        stationCheckboxes.innerHTML = '';
        const data = snapshot.val();
        if(data) {
            for (const [id, st] of Object.entries(data)) {
                stationCheckboxes.innerHTML += `
                    <div class="form-check">
                        <input class="form-check-input station-chk" type="checkbox" value="${id}" id="chk_${id}">
                        <label class="form-check-label" for="chk_${id}">${st.name}</label>
                    </div>
                `;
            }
        } else {
            stationCheckboxes.innerHTML = '<span class="text-muted">ยังไม่ได้สร้างฐานกิจกรรม</span>';
        }
    });

    // 2. โหลดรายชื่อ User มาแสดงในตาราง
    const userTableBody = document.getElementById('userTableBody');
    onValue(ref(db, 'users'), (snapshot) => {
        userTableBody.innerHTML = '';
        const users = snapshot.val();
        if(users) {
            for (const [uid, user] of Object.entries(users)) {
                let stList = user.allowedStations ? user.allowedStations.join(', ') : 'ทั้งหมด (Admin)';
                if (user.role === 'staff' && !user.allowedStations) stList = 'ยังไม่กำหนดฐาน';
                
                userTableBody.innerHTML += `
                    <tr>
                        <td>${user.email}</td>
                        <td><span class="badge ${user.role === 'admin' ? 'bg-danger' : 'bg-success'}">${user.role.toUpperCase()}</span></td>
                        <td><small>${stList}</small></td>
                    </tr>
                `;
            }
        }
    });

    // 3. บันทึกข้อมูลสิทธิ์ลง Database
    document.getElementById('btnSaveUser').onclick = () => {
        const uid = document.getElementById('uid').value.trim();
        const email = document.getElementById('email').value.trim();
        const role = document.getElementById('role').value;
        
        if(!uid || !email) {
            alert("กรุณากรอก UID และ Email");
            return;
        }

        const userData = { email: email, role: role };

        // ถ้าระดับเป็น Staff ให้บันทึกฐานที่อนุญาตด้วย
        if (role === 'staff') {
            const allowed = [];
            document.querySelectorAll('.station-chk:checked').forEach(chk => {
                allowed.push(chk.value);
            });
            userData.allowedStations = allowed;
        }

        // อัปเดตลง Realtime Database
        set(ref(db, `users/${uid}`), userData)
            .then(() => {
                alert("บันทึกสิทธิ์สำเร็จ!");
                // เคลียร์ฟอร์ม
                document.getElementById('uid').value = '';
                document.getElementById('email').value = '';
                document.querySelectorAll('.station-chk').forEach(c => c.checked = false);
            })
            .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
    };
</script>
</body>
</html>
